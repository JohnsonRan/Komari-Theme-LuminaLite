name: Build theme package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build package
        run: npm run package

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: Komari-Theme-LuminaLite-package
          path: |
            Komari-Theme-LuminaLite-v*.zip
            preview.png

      - name: Resolve release notes
        if: startsWith(github.ref, 'refs/tags/')
        id: release-notes
        shell: bash
        run: |
          notes=".github/release-notes/${GITHUB_REF_NAME}.md"
          if [[ ! -f "$notes" ]]; then
            echo "::error::Missing release notes: $notes"
            exit 1
          fi
          echo "path=$notes" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            Komari-Theme-LuminaLite-v*.zip
            preview.png
          body_path: ${{ steps.release-notes.outputs.path }}
